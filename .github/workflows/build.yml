name: Build Bot Executable

permissions:
  contents: read
  
on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]
  workflow_dispatch:

jobs:
  build-matrix:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Generate hidden imports and build executable
      shell: bash
      run: |
        echo "Generating hidden imports from requirements..."
        HIDDEN_IMPORTS=$(pip freeze | cut -d '=' -f1 | xargs -I{} echo --hidden-import={} | xargs)
        echo "Hidden imports: $HIDDEN_IMPORTS"
  
        pyinstaller --name main \
          --paths=./src/bot \
          --add-data="src/bot/main.py:bot" \
          --add-data="src/bot/commands:bot/commands" \
          --add-data="src/bot/helpers:bot/helpers" \
          $HIDDEN_IMPORTS \
          ./src/bot/main.py

    - name: Decode and import certificate
      if: matrix.os == 'macos-latest'
      run: |
        echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
        security create-keychain -p actions build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p actions build.keychain
        security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
        security set-key-partition-list -S apple-tool:,apple: -s -k actions build.keychain

    - name: Sign the binary
      if: matrix.os == 'macos-latest'
      run: |
        codesign --deep --force --verbose \
          --sign "Developer ID Application: Your Name (TEAMID)" \
          dist/main/main

    - name: Notarize the binary
      if: matrix.os == 'macos-latest'
      run: |
        ditto -c -k --sequesterRsrc --keepParent dist/main/main main.zip

        xcrun notarytool submit main.zip \
          --apple-id "$AC_USERNAME" \
          --team-id "YOUR_TEAM_ID" \
          --password "$AC_PASSWORD" \
          --wait

        xcrun stapler staple dist/main/main

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: main-${{ matrix.os }}
        path: dist/main
